<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.V | Factual RJ Roleplay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --primary: #00d4ff; --accent: #f1c40f; --bg: #05070a;
            --glass: rgba(18, 22, 31, 0.8); --border: rgba(0, 212, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: radial-gradient(circle at top, #001a33 0%, #05070a 100%);
            color: #fff; font-family: 'Rajdhani', sans-serif; padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; }

        /* HEADER CYBERPUNK */
        header { 
            text-align: center; padding: 60px 0; 
            background: linear-gradient(to bottom, rgba(0,212,255,0.1), transparent);
            border-radius: 20px; border: 1px solid var(--border); margin-bottom: 40px;
        }
        header h1 { 
            font-family: 'Orbitron', sans-serif; font-size: 3rem; letter-spacing: 8px; 
            text-shadow: 0 0 15px var(--primary); color: #fff;
        }
        header p { letter-spacing: 3px; color: var(--primary); font-weight: bold; margin-top: 10px; }

        /* GERADOR DE PROTOCOLO */
        .gen-container {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 15px; border: 1px solid var(--border);
            text-align: center; margin-bottom: 30px; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .code-box {
            font-family: 'Orbitron', sans-serif; font-size: 2.2rem; color: var(--accent);
            padding: 20px; background: rgba(0,0,0,0.4); border-radius: 10px;
            margin: 20px 0; border: 2px solid var(--accent); display: inline-block;
            box-shadow: inset 0 0 15px rgba(241, 196, 15, 0.2);
        }
        .btn-gen {
            background: var(--primary); color: #000; border: none; padding: 15px 35px;
            font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); transition: 0.3s;
        }
        .btn-gen:hover { background: #fff; transform: scale(1.05); }

        /* FORMULÁRIO ESTILIZADO */
        .glass-panel {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 20px; border: 1px solid var(--border);
            margin-bottom: 25px;
        }
        .label-neon { color: var(--primary); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 10px; display: block; }
        
        input, textarea {
            width: 100%; padding: 15px; background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            border-radius: 8px; color: #fff; font-size: 1.1rem; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,212,255,0.3); outline: none; }
        textarea { height: 120px; }

        .btn-submit {
            width: 100%; padding: 25px; background: none; border: 2px solid var(--accent);
            color: var(--accent); font-family: 'Orbitron', sans-serif; font-size: 1.5rem;
            font-weight: bold; cursor: pointer; transition: 0.4s; text-transform: uppercase;
        }
        .btn-submit:hover { background: var(--accent); color: #000; box-shadow: 0 0 30px rgba(241, 196, 15, 0.4); }

        /* SUCCESS */
        #successScreen { display: none; text-align: center; padding: 100px 20px; }
    </style>
</head>
<body>

<div class="container" id="content">
    <header>
        <h1>FACTUAL RJ</h1>
        <p>SISTEMA INTEGRADO DE VERIFICAÇÃO</p>
    </header>

    <div class="gen-container">
        <span class="label-neon">Fase 01: Gerar codigo</span>
        <div class="code-box" id="displayCode">------</div><br>
        <button class="btn-gen" onclick="gerarProtocolo()">GERAR ACESSO</button>
    </div>

    <form id="formWl" onsubmit="enviarDados(event)">
        <div class="glass-panel">
            <span class="label-neon">Fase 02: Identificação OOC/IC</span>
            <div style="margin-bottom: 20px;">
                <label>Cole o seu ID(código) aqui!:</label>
                <input type="text" id="iptProtocolo" required placeholder="Ex: F230">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div><label>Nome Discord:</label><input type="text" id="iptDiscord" required></div>
                <div><label>Roblox ID:</label><input type="number" id="iptRoblox" required></div>
            </div>
        </div>

        <div class="glass-panel">
            <span class="label-neon">Fase 03: Teste de Aptidão (15 Questões)</span>
            <div id="questoesArea"></div>
        </div>

        <button type="submit" class="btn-submit">Transmitir Dados à Staff</button>
    </form>

    <div id="successScreen">
        <h1 style="color: var(--accent);">Whitilist Enviada com sucesso! 📡</h1>
        <p>Sua análise foi enviada ao servidor central. Aguarde no Discord.</p>
        <button class="btn-gen" style="margin-top: 30px;" onclick="location.reload()">NOVO FORMULÁRIO</button>
    </div>
</div>

<script>
    const URL_WEBHOOK = "https://discord.com/api/webhooks/1486442698318680144/Xi_uYKki0-2UohYtLj0ggiAFFuS5JBwVaFEe6HAhBREXXQlVKbjg7CSdy-rX_ChvB2_l";

    // Perguntas para facilitar a manutenção
    const perguntas = [
        "O que é MetaGaming (MG)?", "O que é PowerGaming (PG)?", "Defina RDM e VDM:", 
        "O que é Combat Logging?", "Explique oque é amor a vida:", "Conceito de IC e OOC:",
        "O que é Safe Zone?", "Defina Revenge Kill:", "Como agir em abordagem policial?",
        "qual é a sua idade?(rp)", "O que é Forçar RP?", 
        "cite 5 regras do Discord?", "O que fazer ao ver um Hacker?",
        "cite 5 regras importantes pra o game?", "Por que merece entrar no Factual RJ?"
    ];

    // Gerar perguntas automaticamente no HTML
    const area = document.getElementById('questoesArea');
    perguntas.forEach((q, i) => {
        area.innerHTML += `
            <div style="margin-bottom: 25px;">
                <label style="color:#888">${i+1}. ${q}</label>
                <textarea id="q${i}" required placeholder="Sua resposta..."></textarea>
            </div>
        `;
    });

    function gerarProtocolo() {
        const id = "FAC-" + Math.random().toString(36).substr(2, 7).toUpperCase();
        document.getElementById('displayCode').innerText = id;
        alert("PROTOCOLO GERADO: " + id + "\nCopie e cole no campo abaixo!");
    }

    async function enviarDados(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true; btn.innerText = "Gerando...";

        const protocol = document.getElementById('iptProtocolo').value;
        const discord = document.getElementById('iptDiscord').value;
        const roblox = document.getElementById('iptRoblox').value;

        // Montar texto das respostas
        let textoRespostas = `📋 **ID USER ${protocol}**\n\n`;
        perguntas.forEach((q, i) => {
            textoRespostas += `**${i+1}. ${q}**\nR: ${document.getElementById('q'+i).value}\n\n`;
        });

        // 1ª MENSAGEM: EMBED DE RESUMO
        const embedResumo = {
            embeds: [{
                title: "💠 NOVA WHITELIST: " + protocol,
                color: 54271,
                fields: [
                    { name: "👤 Candidato", value: discord, inline: true },
                    { name: "🆔 Roblox ID", value: roblox, inline: true }
                ],
                footer: { text: "Factual RJ - Sistema de Admissão" },
                timestamp: new Date()
            }]
        };

        try {
            // Enviar resumo
            await fetch(URL_WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(embedResumo) });
            
            // Enviar respostas logo em seguida (em mensagem separada para não bugar o limite do embed)
            await fetch(URL_WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ content: textoRespostas }) });

            document.getElementById('formWl').style.display = 'none';
            document.querySelector('.gen-container').style.display = 'none';
            document.getElementById('successScreen').style.display = 'block';
        } catch (err) {
            alert("Erro ao transmitir. Verifique o console.");
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
