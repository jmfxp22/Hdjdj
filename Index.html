<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whitelist | Factual RJ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;800&display=swap');

        :root {
            --primary: #8b5cf6; --bg: #0f172a; --card: #1e293b;
            --accent: #00f2ff; --white: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--bg);
            background-image: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--white);
            display: flex; flex-direction: column; align-items: center;
            padding: 60px 20px; min-height: 100vh;
        }

        .container { max-width: 800px; width: 100%; }

        header { text-align: center; margin-bottom: 50px; }
        header h1 { 
            font-family: 'Bebas Neue', cursive; font-size: 5.5rem; 
            color: var(--primary); text-shadow: 0 0 25px rgba(139, 92, 246, 0.4);
            letter-spacing: 4px; line-height: 0.9;
        }
        header p { text-transform: uppercase; letter-spacing: 5px; font-weight: 600; color: var(--accent); font-size: 1rem; margin-top: 10px; }

        .form-box {
            background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px);
            padding: 45px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .section-title { 
            font-family: 'Bebas Neue'; font-size: 2.8rem; 
            margin-bottom: 35px; border-bottom: 3px solid var(--primary);
            display: block; color: var(--white);
        }

        .input-group { margin-bottom: 30px; }
        label { display: block; margin-bottom: 12px; font-weight: 600; font-size: 0.95rem; color: #cbd5e1; }
        
        input, textarea {
            width: 100%; padding: 18px; background: #0f172a; border: 2px solid #334155;
            border-radius: 14px; color: white; font-size: 1.05rem; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; background: #1e1b4b; }

        .gen-section {
            background: rgba(139, 92, 246, 0.1); border: 2px dashed var(--primary);
            padding: 25px; border-radius: 15px; text-align: center; margin: 30px 0;
        }
        .id-display {
            font-family: 'Bebas Neue'; font-size: 4rem; color: var(--accent);
            display: block; margin: 10px 0; text-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        .btn-gen {
            background: var(--primary); color: white; border: none; padding: 12px 30px;
            border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase;
        }

        .btn-submit {
            width: 100%; padding: 22px; background: #10b981; color: white;
            border: none; border-radius: 14px; font-weight: 800; font-size: 1.3rem;
            cursor: pointer; transition: 0.4s; text-transform: uppercase;
        }

        footer { margin-top: 50px; color: #64748b; font-size: 0.9rem; text-align: center; }
        #success { display: none; text-align: center; padding: 100px 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FACTUAL <span>RJ</span></h1>
        <p>Departamento de Imigração</p>
    </header>

    <form id="wlForm" onsubmit="enviar(event)">
        <div class="form-box">
            <h2 class="section-title">Registro de Cidadão</h2>
            
            <div class="input-group">
                <label>Confirme seu Usuário do Discord:</label>
                <input type="text" id="iptDiscord" required placeholder="ex: marquinhos_rp">
            </div>

            <h2 class="section-title" style="margin-top:30px;">Avaliação Técnica</h2>
            <div id="perguntasHTML"></div>

            <div class="gen-section">
                <label>Clique para Gerar seu ID Único:</label>
                <span class="id-display" id="idShow">----</span>
                <button type="button" class="btn-gen" id="genBtn" onclick="gerarIDUnico()">Gerar Registro</button>
                
                <div class="input-group" style="margin-top: 20px; text-align: left;">
                    <label>Confirme o ID gerado acima:</label>
                    <input type="number" id="iptID" required readonly placeholder="O ID aparecerá aqui" style="background: #1e293b; border-color: var(--primary); text-align: center; font-weight: bold; color: var(--accent);">
                </div>
            </div>

            <button type="submit" class="btn-submit">Enviar Candidatura</button>
        </div>
    </form>

    <div id="success">
        <h1 style="font-family: 'Bebas Neue'; font-size: 5rem; color: #10b981;">SUCESSO!</h1>
        <p>Sua ficha foi enviada com o protocolo gerado.</p>
        <button class="btn-submit" style="width: auto; padding: 15px 40px; margin-top: 40px;" onclick="location.reload()">Novo Formulário</button>
    </div>

    <footer>
        <p>© Todos os Direitos Reservados a Factual RJ 2026</p>
    </footer>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1486442698318680144/Xi_uYKki0-2UohYtLj0ggiAFFuS5JBwVaFEe6HAhBREXXQlVKbjg7CSdy-rX_ChvB2_l";

    const perguntas = [
        "Nick Discord",
        "O que é MetaGaming (MG)?", 
        "O que é PowerGaming (PG)?", 
        "Defina RDM e VDM:", 
        "O que é Combat Logging?", 
        "Explique o que é amor a vida:", 
        "Conceito de IC e OOC:",
        "O que é Safe Zone?", 
        "Defina Revenge Kill:", 
        "Como agir em abordagem policial?",
        "Qual é a sua idade? (RP)", 
        "O que é Forçar RP?", 
        "Cite 5 regras do Discord:", 
        "O que fazer ao ver um Hacker?",
        "Cite 5 regras importantes para o game:", 
        "Por que merece entrar no Factual RJ?"
    ];

    const container = document.getElementById('perguntasHTML');
    perguntas.forEach((q, i) => {
        container.innerHTML += `<div class="input-group"><label>${i+1}. ${q}</label><textarea id="res${i}" required></textarea></div>`;
    });

    function gerarIDUnico() {
        const timePart = Date.now().toString().slice(-3);
        const randomPart = Math.floor(Math.random() * 900) + 100;
        const finalID = (parseInt(timePart + randomPart) % 4999) + 1;

        document.getElementById('idShow').innerText = finalID;
        document.getElementById('iptID').value = finalID;
        document.getElementById('genBtn').disabled = true;
        document.getElementById('genBtn').innerText = "ID REGISTRADO";
    }

    async function enviar(e) {
        e.preventDefault();
        const pass = document.getElementById('iptID').value;
        if(!pass) return alert("Gere seu ID antes de enviar!");

        const btn = e.target.querySelector('.btn-submit');
        btn.disabled = true; btn.innerText = "ENVIANDO...";

        const disc = document.getElementById('iptDiscord').value;

        let totalRespostas = `📋 **RELATÓRIO DE WHITELIST - ID: ${pass}**\n\n`;
        perguntas.forEach((q, i) => {
            totalRespostas += `**${i+1}. ${q}**\nR: ${document.getElementById('res'+i).value}\n\n`;
        });

        const resumo = {
            embeds: [{
                title: "💠 NOVA WHITELIST: ID " + pass,
                color: 9127158,
                fields: [
                    { name: "🆔 ID Passaporte", value: `\`${pass}\``, inline: true },
                    { name: "👤 Candidato", value: disc, inline: true }
                ],
                footer: { text: "Factual RJ | Verificação de IDs" },
                timestamp: new Date()
            }]
        };

        try {
            await fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(resumo) });
            await fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ content: totalRespostas }) });
            document.getElementById('wlForm').style.display = 'none';
            document.getElementById('success').style.display = 'block';
        } catch (err) {
            alert("Erro no envio!");
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
