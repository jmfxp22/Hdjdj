<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whitelist | Factual RJ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;800&display=swap');

        :root {
            --primary: #8b5cf6; /* Roxo Vivo */
            --secondary: #6d28d9;
            --bg: #0f172a; /* Fundo Gamer Dark */
            --card: #1e293b;
            --accent: #00f2ff; /* Ciano Neon para detalhes */
            --white: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--bg);
            background-image: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--white);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container { max-width: 800px; width: 100%; }

        /* HEADER IMPACTANTE */
        header { text-align: center; margin-bottom: 50px; }
        header h1 { 
            font-family: 'Bebas Neue', cursive; 
            font-size: 5rem; 
            color: var(--primary);
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
            letter-spacing: 4px;
            line-height: 1;
        }
        header h1 span { color: var(--white); }
        header p { 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 600; 
            color: var(--accent);
            font-size: 0.9rem;
        }

        /* CARD DO PASSAPORTE (ID) */
        .pass-card {
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 2px solid var(--primary);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        .pass-card::before {
            content: "FACTUAL";
            position: absolute; top: -20px; right: -20px;
            font-size: 6rem; font-family: 'Bebas Neue';
            opacity: 0.03; color: white; transform: rotate(-20deg);
        }

        .id-text { font-weight: 800; font-size: 1rem; color: var(--accent); text-transform: uppercase; }
        .id-number { 
            display: block; 
            font-size: 5rem; 
            font-weight: 800; 
            color: var(--white); 
            margin: 10px 0;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .btn-action {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 18px 40px;
            font-weight: 800; border-radius: 50px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(109, 40, 217, 0.3);
        }
        .btn-action:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(139, 92, 246, 0.6); }

        /* FORMULÁRIO */
        .form-box {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 40px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .form-box h2 { 
            font-family: 'Bebas Neue'; font-size: 2.5rem; 
            margin-bottom: 30px; border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 0.9rem; color: #94a3b8; }
        
        input, textarea {
            width: 100%; padding: 15px; background: #0f172a; border: 2px solid #334155;
            border-radius: 12px; color: white; font-size: 1rem; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; background: #1e1b4b; }
        textarea { height: 120px; resize: none; }

        .btn-submit {
            width: 100%; padding: 20px; background: #10b981; color: white;
            border: none; border-radius: 12px; font-weight: 800; font-size: 1.2rem;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-submit:hover { background: #059669; box-shadow: 0 0 25px rgba(16, 185, 129, 0.4); }

        #success { display: none; text-align: center; padding: 80px 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <p>Inicie sua jornada no Rio de Janeiro</p>
        <h1>FACTUAL <span>RJ</span></h1>
    </header>

    <div class="pass-card">
        <p class="id-text">Seu Passaporte de Cidadão</p>
        <span class="id-number" id="idDisplay">----</span>
        <button class="btn-action" onclick="gerarPassaporte()">Gerar Registro</button>
    </div>

    <form id="wlForm" onsubmit="enviar(event)">
        <div class="form-box">
            <h2>Dados de Acesso</h2>
            
            <div class="input-group">
                <label>Confirme o Número do seu Passaporte:</label>
                <input type="number" id="iptID" required placeholder="Digite o número que você gerou acima">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-group"><label>Seu Discord (User):</label><input type="text" id="iptDiscord" required placeholder="ex: marquinhos_rp"></div>
                <div class="input-group"><label>Roblox ID (Apenas números):</label><input type="number" id="iptRoblox" required></div>
            </div>

            <h2 style="margin-top:20px;">Teste de Roleplay</h2>
            <div id="perguntasHTML"></div>

            <button type="submit" class="btn-submit">Enviar para Avaliação</button>
        </div>
    </form>

    <div id="success">
        <h1 style="font-family: 'Bebas Neue'; font-size: 5rem; color: #10b981;">ENVIADO!</h1>
        <p>Seus dados foram transmitidos com sucesso. Verifique o Discord em breve.</p>
        <button class="btn-action" style="margin-top: 30px;" onclick="location.reload()">Refazer</button>
    </div>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1486442698318680144/Xi_uYKki0-2UohYtLj0ggiAFFuS5JBwVaFEe6HAhBREXXQlVKbjg7CSdy-rX_ChvB2_l";

    const perguntas = [
        "O que é MetaGaming (MG)?", "O que é PowerGaming (PG)?", "Defina RDM e VDM:", 
        "O que é Combat Logging?", "Explique o que é amor a vida:", "Conceito de IC e OOC:",
        "O que é Safe Zone?", "Defina Revenge Kill:", "Como agir em abordagem policial?",
        "Qual é a sua idade? (RP)", "O que é Forçar RP?", 
        "Cite 5 regras do Discord:", "O que fazer ao ver um Hacker?",
        "Cite 5 regras importantes para o game:", "Por que merece entrar no Factual RJ?"
    ];

    const container = document.getElementById('perguntasHTML');
    perguntas.forEach((q, i) => {
        container.innerHTML += `
            <div class="input-group">
                <label>${i+1}. ${q}</label>
                <textarea id="res${i}" required placeholder="Descreva sua resposta aqui..."></textarea>
            </div>
        `;
    });

    function gerarPassaporte() {
        // Gera número entre 1 e 5000
        const id = Math.floor(Math.random() * 5000) + 1;
        document.getElementById('idDisplay').innerText = id;
        alert("Número " + id + " gerado com sucesso! Digite-o no campo de confirmação.");
    }

    async function enviar(e) {
        e.preventDefault();
        const btn = e.target.querySelector('.btn-submit');
        btn.disabled = true; btn.innerText = "TRANSMITINDO...";

        const pass = document.getElementById('iptID').value;
        const disc = document.getElementById('iptDiscord').value;
        const robx = document.getElementById('iptRoblox').value;

        let totalRespostas = `📋 **RELATÓRIO DE WHITELIST - PASSAPORTE ${pass}**\n\n`;
        perguntas.forEach((q, i) => {
            totalRespostas += `**${i+1}. ${q}**\nR: ${document.getElementById('res'+i).value}\n\n`;
        });

        const resumo = {
            embeds: [{
                title: "💠 NOVO CANDIDATO: ID " + pass,
                color: 9127158, // Roxo
                fields: [
                    { name: "👤 Discord", value: disc, inline: true },
                    { name: "🆔 Roblox ID", value: robx, inline: true }
                ],
                footer: { text: "Factual RJ Roleplay" },
                timestamp: new Date()
            }]
        };

        try {
            await fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(resumo) });
            await fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ content: totalRespostas }) });

            document.getElementById('wlForm').style.display = 'none';
            document.querySelector('.pass-card').style.display = 'none';
            document.getElementById('success').style.display = 'block';
        } catch (err) {
            alert("Erro no envio!");
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
